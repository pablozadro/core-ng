<button
  [type]="type"
  class="{{theme}}-btn"
  [ngClass]="{
    'is--block': block,
    'is--square': square
  }">

  <span 
    *ngIf="label"
    [ngClass]="{
      'is--right': iconPosition === 'left',
      'is--left': iconPosition === 'right'
    }">
    {{label}}
  </span>

  <i 
    *ngIf="icon" class="material-icons"
    [ngClass]="{
      'is--right': iconPosition === 'right',
      'is--left': iconPosition === 'left'
    }">
    {{icon}}
  </i>

</button>
